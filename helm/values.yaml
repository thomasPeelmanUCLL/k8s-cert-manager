# cert-manager Helm values
# https://artifacthub.io/packages/helm/cert-manager/cert-manager

# Pin to a specific version or leave empty to always use latest during deploy
chartVersion: ""  # e.g. "v1.17.0" — kept empty = latest

# -- Install CRDs as part of the Helm release
installCRDs: true

# -- Number of cert-manager controller replicas
replicaCount: 1

# -- Resource requests/limits for the controller
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# -- Prometheus metrics
# prometheus.enabled exposes the /metrics endpoint on port 9402
# servicemonitor.enabled is set to FALSE intentionally:
#   The ServiceMonitor CRD is provided by the Prometheus Operator (kube-prometheus-stack).
#   cert-manager must be deployed BEFORE kube-prometheus-stack, so the CRD doesn't exist yet.
#   Scraping is handled instead via additionalScrapeConfigs in k8s-prometheus/helm/values.yaml.
prometheus:
  enabled: true
  servicemonitor:
    enabled: false

# -- Global log level (1-6)
global:
  logLevel: 2
