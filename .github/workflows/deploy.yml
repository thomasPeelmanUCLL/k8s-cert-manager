name: Deploy cert-manager

on:
  push:
    branches:
      - main
    paths:
      - 'helm/values.yaml'
      - 'issuers/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Chart version to deploy (leave blank for latest)'
        required: false
        default: ''

jobs:
  deploy:
    name: Helm deploy to Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Add Jetstack Helm repo
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Resolve chart version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.chart_version }}"
          VALUES_VERSION=$(yq '.chartVersion' helm/values.yaml | tr -d '"')

          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "null" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          elif [ -n "$VALUES_VERSION" ] && [ "$VALUES_VERSION" != "null" ] && [ "$VALUES_VERSION" != "\"\"" ]; then
            echo "version=$VALUES_VERSION" >> $GITHUB_OUTPUT
          else
            LATEST=$(helm search repo jetstack/cert-manager --output json | jq -r '.[0].version')
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Strip custom keys from values
        run: |
          yq 'del(.chartVersion)' helm/values.yaml > /tmp/helm-values.yaml

      - name: Deploy cert-manager
        run: |
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version ${{ steps.version.outputs.version }} \
            -f /tmp/helm-values.yaml \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/cert-manager -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl rollout status deployment/cert-manager-cainjector -n cert-manager --timeout=120s

      - name: Apply ClusterIssuers
        run: |
          echo "🔐 Applying ClusterIssuers..."

          # HTTP-01 issuers (for non-proxied domains)
          kubectl apply -f issuers/letsencrypt-staging-http01.yaml
          kubectl apply -f issuers/letsencrypt-prod-http01.yaml

          # DNS-01 via Cloudflare (for proxied/IPv6 domains like euroclasstravel.com)
          # Requires cloudflare-api-token secret to exist in cert-manager namespace
          if kubectl get secret cloudflare-api-token -n cert-manager &>/dev/null; then
            echo "✅ Cloudflare API token secret found — applying Cloudflare issuers"
            kubectl apply -f issuers/letsencrypt-staging-dns01-cloudflare.yaml
            kubectl apply -f issuers/letsencrypt-prod-dns01-cloudflare.yaml
          else
            echo "⚠️  Skipping Cloudflare issuers — secret 'cloudflare-api-token' not found in cert-manager namespace"
            echo "📝 Create it with:"
            echo "     kubectl create secret generic cloudflare-api-token \\"
            echo "       --from-literal=api-token=<your-token> \\"
            echo "       -n cert-manager"
          fi

          # DNS-01 via DigitalOcean (optional, for DO DNS users)
          if kubectl get secret digitalocean-dns -n cert-manager &>/dev/null; then
            echo "✅ DigitalOcean DNS secret found — applying DO issuer"
            kubectl apply -f issuers/letsencrypt-prod-dns01-digitalocean.yaml
          else
            echo "⚠️  Skipping DigitalOcean issuer — secret 'digitalocean-dns' not found"
          fi

      - name: Wait for ClusterIssuers to be Ready
        run: |
          echo "⏳ Waiting for ClusterIssuers to become Ready..."
          for issuer in $(kubectl get clusterissuer -o jsonpath='{.items[*].metadata.name}'); do
            for i in $(seq 1 12); do
              READY=$(kubectl get clusterissuer $issuer -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)
              if [ "$READY" = "True" ]; then
                echo "✅ $issuer is Ready"
                break
              fi
              echo "⏳ Waiting for $issuer... ($i/12)"
              sleep 5
            done
          done
          echo ""
          echo "=== ClusterIssuer status ==="
          kubectl get clusterissuer
