name: Check for cert-manager updates

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch: {}  # Allow manual trigger too

jobs:
  check-update:
    name: Compare latest chart version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Add Jetstack Helm repo
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

      - name: Get latest chart version
        id: latest
        run: |
          LATEST=$(helm search repo jetstack/cert-manager --output json | jq -r '.[0].version')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current pinned version
        id: current
        run: |
          CURRENT=$(grep 'chartVersion:' helm/values.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Open PR if update available
        if: steps.latest.outputs.version != steps.current.outputs.version && steps.current.outputs.version != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump cert-manager chart to ${{ steps.latest.outputs.version }}"
          branch: "chore/bump-cert-manager-${{ steps.latest.outputs.version }}"
          title: "chore: bump cert-manager to ${{ steps.latest.outputs.version }}"
          body: |
            ## cert-manager chart update

            A new version of the cert-manager Helm chart is available.

            | | Version |
            |---|---|
            | Current | `${{ steps.current.outputs.version }}` |
            | Latest  | `${{ steps.latest.outputs.version }}` |

            **Action required:** Review the [cert-manager changelog](https://github.com/cert-manager/cert-manager/releases) and merge this PR to update.
          labels: dependencies,helm

      - name: Report no update needed
        if: steps.latest.outputs.version == steps.current.outputs.version || steps.current.outputs.version == ''
        run: |
          echo "✅ cert-manager is up to date (latest: ${{ steps.latest.outputs.version }})  or version is unpinned — no PR needed."
