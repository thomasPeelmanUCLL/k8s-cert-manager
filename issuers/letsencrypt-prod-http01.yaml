# Let's Encrypt PRODUCTION ClusterIssuer — HTTP-01 challenge
# Only switch to this once staging works.
# Requires your Ingress to be publicly reachable on port 80.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: thomas.peelman@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
