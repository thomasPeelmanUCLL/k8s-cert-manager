# Let's Encrypt PRODUCTION ClusterIssuer — DNS-01 challenge via DigitalOcean
# Best for wildcard certs (*.yourdomain.com) and private/internal services.
#
# Prerequisites:
#   1. Create a DigitalOcean API token with Read+Write DNS scope
#   2. Store it as a secret:
#      kubectl create secret generic digitalocean-dns \
#        --from-literal=access-token=<your-do-token> \
#        -n cert-manager
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: thomas.peelman@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-dns-account-key
    solvers:
      - dns01:
          digitalocean:
            tokenSecretRef:
              name: digitalocean-dns
              key: access-token
