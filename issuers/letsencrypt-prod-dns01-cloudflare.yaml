# Let's Encrypt PRODUCTION ClusterIssuer — DNS-01 via Cloudflare
#
# Use this when:
#   - Your domain is proxied through Cloudflare (orange cloud)
#   - You're on IPv6 and need IPv4 reachability for HTTP-01
#   - You want wildcard certs (*.euroclasstravel.com)
#
# Prerequisites:
#   1. Create a Cloudflare API token:
#      - Go to https://dash.cloudflare.com/profile/api-tokens
#      - Click "Create Token"
#      - Use template "Edit zone DNS"
#      - Scope it to Zone: euroclasstravel.com
#
#   2. Store the token as a Kubernetes secret:
#      kubectl create secret generic cloudflare-api-token \
#        --from-literal=api-token=<your-cloudflare-token> \
#        -n cert-manager
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: thomas.peelman@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
