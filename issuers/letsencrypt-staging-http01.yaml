# Let's Encrypt STAGING ClusterIssuer — HTTP-01 challenge
# Use this first to test without hitting LE rate limits.
# Requires your Ingress to be publicly reachable on port 80.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: your-email@example.com          # <-- change this
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: traefik                  # matches your Traefik ingress class
