# Let's Encrypt STAGING ClusterIssuer — DNS-01 via Cloudflare
# Use this first to test without hitting LE rate limits.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging-cloudflare
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: thomas.peelman@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
