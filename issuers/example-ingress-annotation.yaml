# Alternative: let cert-manager auto-issue via Ingress annotation
# No need to create a Certificate resource manually.
# cert-manager watches Ingresses with this annotation and handles everything.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod   # <-- issuer name
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - myapp.yourdomain.com
      secretName: my-app-tls
  rules:
    - host: myapp.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-app-svc
                port:
                  number: 80
